        <!-- Script ini dipakai untuk menonaktifkan console browser saat website berjalan di domain production -->
        <script>
            (function() {
                'use strict';
                // Mengecek apakah website sedang dibuka di domain production
                var hostname = window.location.hostname;
                var isProduction = hostname === 'satudata.tangerang.go.id' || hostname === 'www.satudata.tangerang.go.id' || hostname === 'satudata.jakarta.go.id' || hostname === 'www.satudata.jakarta.go.id' || (hostname !== 'localhost' && hostname !== '127.0.0.1' && !hostname.startsWith('192.168.') && !hostname.startsWith('10.') && !hostname.includes('local'));

                // Jika production, semua method console akan dibungkam agar log tidak terlihat di browser publik
                if (isProduction) {
                    // Fungsi kosong pengganti console.log, console.error, dan method lainnya
                    var noop = function() {};
                    // Daftar method console yang ingin dimatikan
                    var methods = ['log', 'debug', 'info', 'warn', 'error', 'trace', 'group', 'groupEnd', 'groupCollapsed', 'table', 'time', 'timeEnd', 'timeLog', 'dir', 'dirxml', 'assert', 'count', 'countReset', 'clear', 'profile', 'profileEnd'];

                    // Menyimpan console asli untuk kebutuhan debug darurat bila suatu saat diperlukan
                    if (!window._originalConsole) {
                        window._originalConsole = {};
                        methods.forEach(function(method) {
                            try {
                                window._originalConsole[method] = console[method];
                            } catch (e) {}
                        });
                    }

                    // Mengganti semua method console dengan fungsi kosong sejak awal
                    methods.forEach(function(method) {
                        try {
                            console[method] = noop;
                        } catch (e) {}
                    });

                    // Mencoba mengunci method console supaya tidak mudah dioverride ulang oleh script lain
                    methods.forEach(function(method) {
                        try {
                            Object.defineProperty(console, method, {
                                value: noop,
                                writable: true,
                                configurable: true,
                                enumerable: false
                            });
                        } catch (e) {
                            try {
                                console[method] = noop;
                            } catch (e2) {}
                        }
                    });

                    // Fungsi bantu untuk memastikan script yang dimuat belakangan juga tetap tidak bisa menulis ke console
                    var overrideConsole = function() {
                        methods.forEach(function(method) {
                            try {
                                if (typeof console[method] === 'function') {
                                    console[method] = function() {
                                        return;
                                    };
                                } else {
                                    console[method] = noop;
                                }
                            } catch (e) {}
                        });
                    };

                    // Menjalankan override saat itu juga
                    overrideConsole();

                    // Mengulang override secara berkala untuk mengantisipasi library yang mencoba mengaktifkan console lagi
                    setInterval(overrideConsole, 100);

                    // Proxy ini dipakai sebagai lapisan tambahan agar akses ke console tetap diarahkan ke fungsi kosong
                    try {
                        var consoleProxy = new Proxy(console,{
                            set: function(target, property, value) {
                                if (methods.indexOf(property) !== -1) {
                                    target[property] = noop;
                                    return true;
                                }
                                target[property] = value;
                                return true;
                            },
                            get: function(target, property) {
                                if (methods.indexOf(property) !== -1) {
                                    return noop;
                                }
                                return target[property];
                            }
                        });
                        try {
                            Object.defineProperty(window, 'console', {
                                value: consoleProxy,
                                writable: true,
                                configurable: true
                            });
                        } catch (e) {}
                    } catch (e) {}
                }
            })();
        </script>
