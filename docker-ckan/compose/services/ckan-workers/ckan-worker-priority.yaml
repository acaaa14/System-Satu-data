---
services:
  ckan-worker-priority:
    image: ghcr.io/keitaroinc/ckan:${CKAN_VERSION}
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
      solr:
        condition: service_healthy
        restart: true
    user: root
    env_file:
      - ${PWD}/config/db/.env
      - ${PWD}/config/ckan/.env
    volumes:
      - ckan_data:/app/data
      -  /root/baru/docker-ckan/extensions:/app/extensions
    entrypoint:
      - /bin/bash
      - -lc
      - uv pip install --system -e /app/extensions/ckanext-restrict_visibility && exec ckan -c /app/production.ini jobs worker priority
    healthcheck:
      disable: true

volumes:
  ckan_data:
