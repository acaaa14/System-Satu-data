services:
  datapusher:
    image: keitaro/ckan-datapusher:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - backend
      - frontend
    extra_hosts:
      - "localhost:host-gateway"
    env_file:
      - ${PWD}/config/ckan/.env
    environment:
      - DATAPUSHER_HOST=0.0.0.0
      - DATAPUSHER_PORT=8000
      - REWRITE_RESOURCES=True
      - REWRITE_URL=http://ckan-ckan-1:5000
