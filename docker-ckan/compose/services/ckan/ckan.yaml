---
services:
  ckan:
    image: ghcr.io/keitaroinc/ckan:${CKAN_VERSION}
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
      solr:
        condition: service_healthy
        restart: true
    ports:
      - "0.0.0.0:${CKAN_PORT}:5000"
    # Extension restrict_visibility perlu diinstall sebelum CKAN membaca
    # CKAN__PLUGINS, supaya tidak terjadi PluginNotFoundException.
    user: root
    command:
      - /bin/bash
      - -lc
      - uv pip install --system -e /app/extensions/ckanext-restrict_visibility -e /app/extensions/ckanext-statsworkflow && ckan config-tool /app/production.ini 'ckanext.xloader.site_url = http://ckan:5000' && ckan config-tool /app/production.ini 'ckanext.xloader.formats = csv application/csv xls xlsx tsv application/vnd.ms-excel application/vnd.openxmlformats-officedocument.spreadsheetml.sheet ods application/vnd.oasis.opendocument.spreadsheet json application/json xml application/xml text/xml' && exec /app/start_ckan.sh
    env_file:
      - ${PWD}/config/db/.env
      - ${PWD}/config/ckan/.env
    volumes:
      - ckan_data:/app/data
      -  /root/baru/docker-ckan/extensions:/app/extensions

volumes:
  ckan_data:
