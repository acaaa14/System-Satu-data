---
services:
  ckan:
    image: ghcr.io/keitaroinc/ckan:${CKAN_VERSION}
    networks:
      - frontend
      - backend
    depends_on:
      db:
        condition: service_healthy
        restart: true
      solr:
        condition: service_healthy
        restart: true
    ports:
      - "0.0.0.0:${CKAN_PORT}:5000"
    # Extension restrict_visibility perlu diinstall sebelum CKAN membaca
    # CKAN__PLUGINS, supaya tidak terjadi PluginNotFoundException.
    user: root
    command:
      - /bin/bash
      - -lc
      - uv pip install --system -e /app/extensions/ckanext-restrict_visibility && exec /app/start_ckan.sh
    env_file:
      - ${PWD}/config/db/.env
      - ${PWD}/config/ckan/.env
    volumes:
      - ckan_data:/app/data
      -  /root/baru/docker-ckan/extensions:/app/extensions

volumes:
  ckan_data:
